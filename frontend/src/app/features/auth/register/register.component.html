<div class="min-h-screen bg-bank-bg flex items-center justify-center p-4 py-10 relative overflow-hidden font-sans selection:bg-brand selection:text-black">
  

  <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand/5 blur-[120px] rounded-full pointer-events-none z-0"></div>

  <div class="w-full max-w-md relative z-10">
    

    <div class="text-center mb-8 relative z-10">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="w-12 h-12 bg-brand rounded-tl-2xl rounded-br-2xl rounded-tr-md rounded-bl-md flex items-center justify-center shadow-[0_0_20px_rgba(0,229,124,0.5)]">
          <svg class="w-7 h-7 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="2 3" stroke-linecap="round"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6l3 6-3 6-3-6 3-6z" fill="currentColor"/>
          </svg>
        </div>
        <span class="text-4xl font-bold tracking-tight text-white">
          Total<span class="text-brand drop-shadow-[0_0_10px_rgba(0,229,124,0.6)]">Bank</span>
        </span>
      </div>
      <p class="text-gray-400 text-sm mt-2">Załóż konto</p>
    </div>


    <div class="card p-8 shadow-[0_10px_40px_rgba(0,229,124,0.05)] border-brand/10">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="label">Imię</label>
            <input formControlName="first_name" type="text" class="input-field" placeholder="Jan" />
            <p *ngIf="form.get('first_name')?.touched && form.get('first_name')?.invalid"
               class="mt-1.5 text-xs text-red-400 font-medium">Wymagane.</p>
          </div>
          <div>
            <label class="label">Nazwisko</label>
            <input formControlName="last_name" type="text" class="input-field" placeholder="Kowalski" />
            <p *ngIf="form.get('last_name')?.touched && form.get('last_name')?.invalid"
               class="mt-1.5 text-xs text-red-400 font-medium">Wymagane.</p>
          </div>
        </div>

        <div class="mb-4">
          <label class="label">Adres email</label>
          <input formControlName="email" type="email" class="input-field"
                 placeholder="jan.kowalski@example.com" autocomplete="email" />
          <p *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
             class="mt-1.5 text-xs text-red-400 font-medium">Podaj prawidłowy email.</p>
        </div>

        <div class="mb-4">
          <label class="label">PESEL</label>
          <input formControlName="pesel" type="text" class="input-field"
                 placeholder="12345678901" maxlength="11" />
          <p *ngIf="form.get('pesel')?.touched && form.get('pesel')?.hasError('pesel')"
             class="mt-1.5 text-xs text-red-400 font-medium">PESEL musi składać się z 11 cyfr.</p>
        </div>

        <div class="mb-4">
          <label class="label">Numer telefonu</label>
          <input formControlName="phone_number" type="tel" class="input-field"
                 placeholder="+48 123 456 789" />
        </div>

        <div class="mb-4">
          <label class="label">Hasło</label>
          <input formControlName="password" type="password" class="input-field"
                 placeholder="Min. 8 znaków" autocomplete="new-password" />
          <p *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')"
             class="mt-1.5 text-xs text-red-400 font-medium">Hasło musi mieć co najmniej 8 znaków.</p>
        </div>

        <div class="mb-6">
          <label class="label">Potwierdź hasło</label>
          <input formControlName="password_confirm" type="password" class="input-field"
                 placeholder="••••••••" autocomplete="new-password" />
          <p *ngIf="form.get('password_confirm')?.touched && form.hasError('mismatch')"
             class="mt-1.5 text-xs text-red-400 font-medium">Hasła nie są identyczne.</p>
        </div>

        <div *ngIf="error()" class="mb-6 p-3 bg-red-950/40 border border-red-900/50 rounded-lg text-red-400 text-sm text-center">
          {{ error() }}
        </div>

        <button
          type="submit"
          [disabled]="loading() || form.invalid"
          class="btn-primary w-full flex items-center justify-center gap-2 text-base py-3"
        >
          <svg *ngIf="loading()" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
          {{ loading() ? 'Tworzenie konta...' : 'Zarejestruj się' }}
        </button>
      </form>

      <p class="text-center text-gray-400 text-sm mt-8">
        Masz już konto?
        <a routerLink="/auth/login" class="text-brand hover:text-brand-dark font-semibold ml-1 transition-colors">
          Zaloguj się
        </a>
      </p>
    </div>
  </div>
</div>
