<div class="h-screen w-full overflow-hidden bg-bank-bg text-white flex font-sans selection:bg-brand selection:text-black">

  <aside class="w-64 flex-shrink-0 bg-bank-panel border-r border-bank-border flex flex-col">

    <div class="px-6 py-8 flex items-center gap-3">

      <div class="w-10 h-10 bg-brand rounded-tl-xl rounded-br-xl rounded-tr-sm rounded-bl-sm flex items-center justify-center shadow-[0_0_15px_rgba(0,229,124,0.4)]">

        <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">

          <circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="2 3" stroke-linecap="round"/>

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6l3 6-3 6-3-6 3-6z" fill="currentColor"/>
        </svg>
      </div>

      <span class="font-bold text-2xl tracking-wide text-white">
        Total<span class="text-brand drop-shadow-[0_0_8px_rgba(0,229,124,0.5)]">Bank</span>
      </span>
    </div>


    <nav class="flex-1 px-4 space-y-2 mt-4">
      <a routerLink="/dashboard" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact:true}"
         class="nav-item">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
        Pulpit
      </a>
      <a routerLink="/p2p" routerLinkActive="nav-active"
         class="nav-item">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
        Przelew na telefon
      </a>
      <a routerLink="/settings" routerLinkActive="nav-active"
         class="nav-item">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        Ustawienia
      </a>
    </nav>


    <div class="p-4 border-t border-bank-border">
      <div *ngIf="user()" class="px-4 pb-4 mb-2 border-b border-bank-border">
        <p class="text-sm font-medium text-white truncate">{{ user()!.first_name }} {{ user()!.last_name }}</p>
        <p class="text-xs text-gray-500 truncate">{{ user()!.email }}</p>
      </div>
      <button (click)="logout()" class="flex items-center gap-4 px-4 py-3 w-full rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-400/10 transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        Wyloguj
      </button>
    </div>
  </aside>


  <div class="flex-1 flex flex-col min-w-0 bg-bank-bg relative overflow-hidden">

    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-brand/5 blur-[120px] rounded-full pointer-events-none z-0"></div>


    <header class="h-24 px-10 flex items-center justify-between border-b border-bank-border bg-bank-bg/80 backdrop-blur-md relative z-40">
      <h1 class="text-2xl font-light tracking-tight text-white uppercase">{{ pageTitle() }}</h1>
      

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-3">

          <div class="relative">
            <button (click)="toggleNotifications()" class="relative w-10 h-10 rounded-full border border-bank-border flex items-center justify-center hover:bg-bank-panel text-gray-400 hover:text-white transition-colors">
              <span *ngIf="notifSvc.unreadCount() > 0"
                    class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-brand text-black text-[9px] font-bold flex items-center justify-center z-10">
                {{ notifSvc.unreadCount() > 9 ? '9+' : notifSvc.unreadCount() }}
              </span>
              <span *ngIf="notifSvc.unreadCount() === 0" class="absolute top-2 right-2 w-2 h-2 rounded-full bg-brand/30"></span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
            </button>

            <div *ngIf="showNotifications()" class="fixed inset-0 z-40" (click)="showNotifications.set(false)"></div>

            <div *ngIf="showNotifications()" class="absolute right-0 top-12 w-80 bg-bank-panel border border-bank-border rounded-xl shadow-2xl z-50 overflow-hidden">
              <div class="px-4 py-3 border-b border-bank-border flex justify-between items-center">
                <h3 class="text-sm font-semibold text-white">Powiadomienia</h3>
                <button (click)="notifSvc.clear()" class="text-xs text-gray-500 hover:text-white transition-colors">Wyczyść</button>
              </div>
              <div class="max-h-80 overflow-y-auto">
                <div *ngIf="notifSvc.items().length === 0" class="px-4 py-8 text-center text-gray-500 text-sm">
                  Brak powiadomień
                </div>
                <div *ngFor="let n of notifSvc.items()"
                     class="flex items-start gap-3 px-4 py-3 border-b border-bank-border/40 last:border-0 hover:bg-white/5 transition-colors">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"
                       [ngClass]="n.type === 'in' ? 'bg-brand/10 text-brand' : 'bg-bank-bg text-gray-400'">
                    <svg *ngIf="n.type === 'in'" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 5L5 19M5 19H12M5 19V12"/>
                    </svg>
                    <svg *ngIf="n.type !== 'in'" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19L19 5M19 5H12M19 5V12"/>
                    </svg>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm text-white leading-snug">{{ n.message }}</p>
                    <p class="text-xs text-gray-500 mt-0.5">{{ n.time | date:'HH:mm' }}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div *ngIf="user()" class="w-10 h-10 rounded-full bg-brand text-black font-bold flex items-center justify-center shadow-lg shadow-brand/20">
            {{ user()!.first_name.charAt(0) }}{{ user()!.last_name.charAt(0) }}
          </div>
        </div>
      </div>
    </header>


    <main class="flex-1 overflow-y-auto p-8 relative z-10">
      <router-outlet />
    </main>
  </div>
</div>
