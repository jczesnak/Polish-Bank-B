services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plbank}
      POSTGRES_USER: ${POSTGRES_USER:-plbank_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plbank_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plbank_user} -d ${POSTGRES_DB:-plbank}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      
      - /app/node_modules
    ports:
      - "4200:4200"
    command: >
      sh -c "npm install && npm start -- --host 0.0.0.0 --poll 2000"
    depends_on:
      - backend

volumes:
  postgres_data:
