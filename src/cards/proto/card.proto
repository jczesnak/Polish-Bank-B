syntax = "proto3";

package cardprovider;

service CardProvider {
    rpc CreateCard (CreateCardRequest) returns (CreateCardResponse);
    rpc GetCardStatus (GetCardRequest) returns (CardDetails);
    rpc BlockCard (BlockCardRequest) returns (BlockCardResponse);
    rpc UnblockCard (UnblockCardRequest) returns (UnblockCardResponse);
    rpc AuthorizeTransaction (AuthorizationRequest) returns (AuthorizationResponse);
    rpc SettleTransaction (SettlementRequest) returns (SettlementResponse);
    rpc InitiateChargeback (ChargebackRequest) returns (ChargebackResponse);
    rpc UpdateCardStatus (UpdateCardStatusRequest) returns (UpdateCardStatusResponse);
    rpc ActivateCard (ActivateCardRequest) returns (ActivateCardResponse);
    rpc ListCards (ListCardsRequest) returns (ListCardsResponse);
    rpc TopUpPrepaid (TopUpRequest) returns (TopUpResponse);
    rpc GetFullPan (GetCardRequest) returns (FullPanResponse);
    rpc ProcessIsoMessage (IsoRequest) returns (IsoResponse);
}

// --- Karty ---

message CreateCardRequest {
    string user_id = 1;
    string account_id = 2;
    string card_type = 3;  // "VIRTUAL" | "PHYSICAL" | "PREPAID"
    float initial_balance = 4;  // tylko dla PREPAID
    string api_key = 5;
    string signature = 6;    // HMAC-SHA256 podpis
    string timestamp = 7;    // Unix timestamp jako string
}

message CreateCardResponse {
    string card_token = 1;
    string masked_pan = 2;
    string status = 3;
    string card_type = 4;
    string bank_id = 5;
    string full_pan = 6;
    string cvv = 7;
    int32 expiry_month = 8;
    int32 expiry_year = 9;
}

message GetCardRequest {
    string card_token = 1;
}

message CardDetails {
    string card_token = 1;
    string status = 2;
    string card_type = 3;
    float balance = 4;
    float daily_limit = 5;
    string masked_pan = 6;
    string bank_id = 7;
    int32 expiry_month = 8;
    int32 expiry_year = 9;
}

message BlockCardRequest {
    string card_token = 1;
    string reason = 2;
}

message BlockCardResponse {
    bool success = 1;
    string message = 2;
}

message UnblockCardRequest {
    string card_token = 1;
}

message UnblockCardResponse {
    bool success = 1;
    string message = 2;
}

// --- Transakcje ---

message AuthorizationRequest {
    string card_number = 1;
    int32 expiry_month = 2;
    int32 expiry_year = 3;
    string cvv = 4;

    double amount = 5;
    string currency = 6;
    string merchant_id = 7;
    string merchant_name = 8;
}

message AuthorizationResponse {
    enum ResponseCode {
        APPROVED = 0;
        DECLINED = 1;
        CARD_BLOCKED = 2;
        INSUFFICIENT_FUNDS = 3;
        CARD_EXPIRED = 4;
        LIMIT_EXCEEDED = 5;
    }
    string authorization_code = 1;
    ResponseCode response_code = 2;
    string message = 3;
    string transaction_id = 4;
}

message SettlementRequest {
    string authorization_code = 1;
    double amount = 2;
}

message SettlementResponse {
    bool success = 1;
    string transaction_id = 2;
    string status = 3;
}

// --- Chargeback ---

message ChargebackRequest {
    string transaction_id = 1;
    string reason = 2;
    string initiated_by = 3;
}

message ChargebackResponse {
    bool success = 1;
    string chargeback_id = 2;
    string status = 3;
}

message UpdateCardStatusRequest {
    string card_token = 1;
    string new_status = 2;
    string changed_by = 3;
}
message UpdateCardStatusResponse {
    bool success = 1;
    string message = 2;
    string current_status = 3;
}

message ActivateCardRequest {
    string card_token = 1;
    string activated_by = 2;
}
message ActivateCardResponse {
    bool success = 1;
    string message = 2;
}

message ListCardsRequest {}
message ListCardsResponse {
    repeated CardDetails cards = 1;
}

message TopUpRequest {
    string card_token = 1;
    double amount = 2;
    string currency = 3;
}
message TopUpResponse {
    bool success = 1;
    string message = 2;
    double new_balance = 3;
}

message FullPanResponse {
    string card_token = 1;
    string full_pan = 2;
    string masked_pan = 3;
    string cvv = 4;
    int32 expiry_month = 5;
    int32 expiry_year = 6;
}
message IsoRequest {
    bytes payload = 1;
}

message IsoResponse {
    bytes payload = 1;
}